# Lumidoc frontend nginx — serves the built SPA AND proxies API / streaming /
# local-storage routes to the backend. Single edge container, single origin.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reasonable defaults
    client_max_body_size 600M;
    keepalive_timeout 65s;
    server_tokens off;

    # ===== GZIP COMPRESSION — critical for slow connections =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Static assets — long cache for hashed bundles, short for index.html.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- SSE streaming endpoint (must NOT buffer) -----
    location ~ ^/api/v1/chat/.+/messages/stream$ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # ----- Regular API -----
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ----- Authenticated local-storage downloads (dev / single-server prod) -----
    location /local-files/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Allow streaming large media files.
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # Backend health probe alias.
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}
