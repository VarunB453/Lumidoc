# =============================================================================
# Lumidoc — root-level compose file.
# Run from the project root:  docker compose up -d --build
#
# This is a thin wrapper that delegates to the server's compose stack with
# correct build contexts resolved relative to the project root.
# =============================================================================

services:
  frontend:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
    image: lumidoc-frontend:latest
    container_name: lumidoc-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lumidoc-net

  api:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    image: lumidoc-api:latest
    container_name: lumidoc-api
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
    volumes:
      - storage_data:/app/storage
      - keys_data:/app/keys
    expose:
      - "8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lumidoc-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.celery
    image: lumidoc-celery:latest
    container_name: lumidoc-celery
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
    volumes:
      - storage_data:/app/storage
      - keys_data:/app/keys
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      -Q pdf,audio,video,summary,timestamps,default
      --concurrency=4
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lumidoc-net
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  beat:
    build:
      context: ./apps/server
      dockerfile: Dockerfile.celery
    image: lumidoc-celery:latest
    container_name: lumidoc-beat
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lumidoc-net

  mongodb:
    image: mongo:7
    container_name: lumidoc-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - lumidoc-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: lumidoc-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - lumidoc-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
  redis_data:
  storage_data:
  keys_data:

networks:
  lumidoc-net:
    driver: bridge
