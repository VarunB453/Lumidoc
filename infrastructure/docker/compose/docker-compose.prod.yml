version: '3.8'

services:
  client:
    image: ${REGISTRY}/lumidoc/client:${VERSION:-latest}
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  server:
    image: ${REGISTRY}/lumidoc/server:${VERSION:-latest}
    restart: always
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  celery:
    image: ${REGISTRY}/lumidoc/celery:${VERSION:-latest}
    restart: always
    environment:
      - ENVIRONMENT=production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  nginx:
    image: ${REGISTRY}/lumidoc/nginx:${VERSION:-latest}
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
