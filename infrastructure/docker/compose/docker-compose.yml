version: '3.8'

services:
  client:
    build:
      context: ../../..
      dockerfile: infrastructure/docker/client.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - app-network

  server:
    build:
      context: ../../..
      dockerfile: infrastructure/docker/server.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../../apps/server/.env
    depends_on:
      - postgres
      - redis
    networks:
      - app-network

  celery:
    build:
      context: ../../..
      dockerfile: infrastructure/docker/celery.Dockerfile
    env_file:
      - ../../../apps/server/.env
    depends_on:
      - redis
      - postgres
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumidoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-lumidoc_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  nginx:
    build:
      context: ../../..
      dockerfile: infrastructure/docker/nginx.Dockerfile
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - client
      - server
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
